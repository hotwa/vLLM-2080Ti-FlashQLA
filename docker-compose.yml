# Pre-built images from Docker Hub - use with: docker-compose up -d
# Both images are built by GitHub Actions

services:
  # ik_llama.cpp service for Qwen3.6-27B (SM75 optimized, 262K context)
  qwen36-ik:
    image: hotwa/ik-llama-cpp-sm75:latest
    container_name: qwen36-27b-ik
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      - "${QWEN_IK_HOST_PORT:-8080}:8080"
    volumes:
      - ./models:/models
      - ./.hf-cache:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-1,0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-1,0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      MODEL_PATH: ${MODEL_PATH:-/models/Qwen3.6-27B-UD-Q4_K_XL.gguf}
      MODEL_REPO: ${MODEL_REPO:-unsloth/Qwen3.6-27B-MTP-GGUF}
      MODEL_FILE: ${MODEL_FILE:-Qwen3.6-27B-UD-Q4_K_XL.gguf}
      MODEL_ALIAS: ${MODEL_ALIAS:-Qwen3.6-27B}
      MTP: ${MTP:-on}
      SPEC_DRAFT_N_MAX: ${SPEC_DRAFT_N_MAX:-1}
      CTX_SIZE: ${CTX_SIZE:-262144}
      N_PREDICT: ${N_PREDICT:-1024}
      NP: ${NP:-1}
      BATCH_SIZE: ${BATCH_SIZE:-128}
      UBATCH_SIZE: ${UBATCH_SIZE:-64}
      N_GPU_LAYERS: ${N_GPU_LAYERS:-999}
      SPLIT_MODE: ${SPLIT_MODE:-graph}
      TENSOR_SPLIT: ${TENSOR_SPLIT:-40,60}
      FLASH_ATTN: ${FLASH_ATTN:-on}
      REASONING: ${REASONING:-off}
      EXTRA_ARGS: ${EXTRA_ARGS:---cache-ram 10240}
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-2}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 30
      start_period: 300s

  # vLLM FlashQLA service (GPTQ-Int4 quantized)
  vllm:
    image: hotwa/vllm-2080ti-flashqla:latest
    container_name: vllm-2080ti
    restart: unless-stopped
    shm_size: "8g"
    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"
    volumes:
      - ./models:/models:ro
      - vllm-torch-cache:/tmp/torch_extensions_cache
      - vllm-triton-cache:/tmp/triton-cache
      - vllm-inductor-cache:/tmp/torchinductor-cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_DIR=/models/Qwen3.6-27B-GPTQ-Int4
      - PORT=8000
      - TORCH_CUDA_ARCH_LIST=7.5
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - FLASHINFER_ENABLE_AOT=1
      - VLLM_SM75_SPEC_SYNC_MODE=nosync
      - VLLM_ALLOW_MAMBA_SPEC_FULL_CUDAGRAPH=1
      - DISABLE_LOG_STATS=1
      - VLLM_INT8KV_FA_PREFILL=1
      - VLLM_INT8KV_FA_CONTINUATION_DEQUANT=1
      - VLLM_INT8KV_FA_CASCADE_DEQUANT=1
      - VLLM_INT8KV_FA_CASCADE_TILE_TOKENS=65536
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

volumes:
  vllm-torch-cache:
  vllm-triton-cache:
  vllm-inductor-cache:
