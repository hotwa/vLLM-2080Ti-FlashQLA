services:
  vllm:
    image: vllm/vllm-openai:v0.18.0-cu130
    container_name: vllm-qwen35-27b-fp8-dynamic
    restart: unless-stopped
    ipc: host
    shm_size: "32gb"

    ports:
      - "8000:8000"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./chat_templates:/app/chat_templates:ro
      - ./tool_parsers:/app/tool_parsers:ro

    environment:
      - HF_TOKEN=${HF_TOKEN}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - VLLM_LOGGING_LEVEL=INFO
      # 老驱动时再开；默认先别开
      # - VLLM_ENABLE_CUDA_COMPATIBILITY=1
    command:
      - --model
      # - mconcat/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-FP8-Dynamic
      - Qwen/Qwen3.5-27B-FP8
      - --trust-remote-code
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --served-model-name
      - Qwen3.5-27B

      # 先保守起步，agent 稳定优先
      - --max-model-len
      - "262144"

      # OpenCode / OpenClaw 先别把并发打太满
      - --max-num-seqs
      - "4"

      # WSL2 / 单卡环境先留一点余量
      - --gpu-memory-utilization
      - "0.92"

      - --enable-auto-tool-choice
      - --tool-parser-plugin
      - /app/tool_parsers/openclaw_xml_tool_parser.py
      - --tool-call-parser
      - openclaw_xml
      - --speculative-config
      - '{"method":"qwen3_next_mtp","num_speculative_tokens":2}'

      # 保留 Qwen3 reasoning parser 兼容链路
      # - --reasoning-parser
      # - qwen3

      # 关键：服务端默认关闭 thinking 输出
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'

      # - --chat-template
      # - /app/chat_templates/qwen35_opencode_xml_mm_v4.jinja
      # - /app/chat_templates/qwen35_openclaw_toolstable_v1.jinja
      # - --chat-template-content-format
      # - openai

      # 如果首启或 cudagraph 不稳，再手动打开
      # - --enforce-eager

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
