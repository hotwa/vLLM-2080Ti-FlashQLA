<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3.6 27B GPTQ-INT4 KV Throughput</title>
  <desc id="desc">Grouped bar charts for prefill and decode throughput across noMTP, MTP3, FP16, INT8, TQK8V4, and TQ4NC KV precision.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fbfcff"/><stop offset="1" stop-color="#f2f5fa"/></linearGradient>
    <style>
      .card { fill: #ffffff; stroke: #d8deea; stroke-width: 1; }
      .grid { stroke: #e7ebf2; stroke-width: 1; }
      .axis { stroke: #aab4c3; stroke-width: 1.5; }
      .split { stroke: #c4ccda; stroke-width: 1.5; stroke-dasharray: 7 7; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #141b2d; }
      .sub { font: 500 16px Arial, Helvetica, sans-serif; fill: #5b6677; }
      .section { font: 700 22px Arial, Helvetica, sans-serif; fill: #1d2738; }
      .tick { font: 500 12px Arial, Helvetica, sans-serif; fill: #7a8494; }
      .label { font: 700 13px Arial, Helvetica, sans-serif; fill: #2b3547; }
      .num4k { font: 700 10px Arial, Helvetica, sans-serif; fill: #356fe8; }
      .num64k { font: 700 10px Arial, Helvetica, sans-serif; fill: #0c8e66; }
      .mode { font: 800 15px Arial, Helvetica, sans-serif; fill: #1d2738; }
      .legend { font: 600 14px Arial, Helvetica, sans-serif; fill: #364255; }
      .note { font: 600 14px Arial, Helvetica, sans-serif; fill: #4e5b70; }
      .bar4k { fill: #356fe8; }
      .bar64k { fill: #10a875; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="url(#bg)"/>
  <text class="title" x="48" y="54">Qwen3.6 27B GPTQ-INT4 KV Throughput</text>
  <text class="sub" x="48" y="84">noMTP vs MTP3 · 4 KV precision settings · single request throughput</text>
