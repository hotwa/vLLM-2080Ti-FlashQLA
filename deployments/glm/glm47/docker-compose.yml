services:
  glmserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_IMAGE: "nvidia/cuda:13.0.1-devel-ubuntu24.04"
    image: hotwa/vllm:latest
    container_name: glmserver
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /usr/lib/wsl/lib/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      - /usr/lib/wsl/lib/libcuda.so:/usr/lib/x86_64-linux-gnu/libcuda.so:ro
    env_file:
      - ./.env
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - "--model"
      - "unsloth/GLM-4.7-Flash-FP8-Dynamic"
      - "--served-model-name"
      - "glm-4.7-flash"
      - "--dtype"
      - "auto"
      - "--seed"
      - "3407"
      - "--max-model-len"
      - "202752"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--max-num-batched-tokens"
      - "16384"
      - "--tool-call-parser"
      - "glm47"
      - "--reasoning-parser"
      - "glm45"
      - "--enable-auto-tool-choice"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    tty: true
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 240
      start_period: 600s


  litellm-router:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm-router
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - ./.env.litellm
    environment:
      # 通过 Docker DNS 用容器名访问 vLLM
      - VLLM_API_BASE=http://glmserver:8000/v1
      # 禁用 streaming logging（解决 vLLM Anthropic 兼容格式问题）
      - LITELLM_DISABLE_STREAMING_LOGGING=true
      # 可选：如果 llama.cpp 的 api_base 带了 /v1，需要禁用自动 append
      # - LITELLM_ANTHROPIC_DISABLE_URL_SUFFIX=true
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    restart: unless-stopped
    depends_on:
      glmserver:
        condition: service_healthy

networks:
  llmnet:
    driver: bridge
