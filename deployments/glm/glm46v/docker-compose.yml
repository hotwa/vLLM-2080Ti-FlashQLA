# GLM-4.6V 本地推理服务栈 (Tailscale 版本)
# 架构: Claude Code → Tailscale VPN → LiteLLM (4000) → vLLM (8000)

services:
  glm-4.6v-awq:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotwa/vllm:nightly
    container_name: glm-4.6v-awq
    ports:
      - "8001:8000"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      # - VLLM_ATTENTION_BACKEND=FLASHINFER
      # - VLLM_FLASHINFER_WORKSPACE_BUFFER_SIZE=1610612736
      - VLLM_USE_TRITON_FLASH_ATTN=0
      # - HF_HUB_OFFLINE=1
      # - TRANSFORMERS_OFFLINE=1
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /usr/lib/wsl/lib/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      - /usr/lib/wsl/lib/libcuda.so:/usr/lib/x86_64-linux-gnu/libcuda.so:ro
    command:
      - "cyankiwi/GLM-4.6V-AWQ-4bit"
      - "--trust-remote-code"
      - "--served-model-name"
      - "glm-4.6v"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "131072"
      - "--max-num-seqs"
      - "1"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--tool-call-parser"
      - "glm45"
      - "--reasoning-parser"
      - "glm45"
      - "--enable-auto-tool-choice"
      - "--distributed-executor-backend"
      - "mp"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    # command: >
    #   cyankiwi/GLM-4.6V-AWQ-4bit
    #   --trust-remote-code
    #   --dtype auto
    #   --max-model-len 131072
    #   --gpu-memory-utilization 0.95
    #   --tensor-parallel-size 1
    #   --enable-auto-tool-choice
    #   --tool-call-parser glm45
    #   --reasoning-parser glm45
    #   --served-model-name glm-4.6v
    #   --host 0.0.0.0
    #   --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 240
      start_period: 600s

  litellm-router:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm-router
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - ./.env.litellm
    environment:
      # 通过 Docker DNS 用容器名访问 vLLM
      - VLLM_API_BASE=http://glm-4.6v-awq:8000/v1
      # 禁用 streaming logging（解决 vLLM Anthropic 兼容格式问题）
      - LITELLM_DISABLE_STREAMING_LOGGING=true
      # 可选：如果 llama.cpp 的 api_base 带了 /v1，需要禁用自动 append
      # - LITELLM_ANTHROPIC_DISABLE_URL_SUFFIX=true
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    restart: unless-stopped
    depends_on:
      glm-4.6v-awq:
        condition: service_healthy

networks:
  llmnet:
    driver: bridge
