# GLM-4.6V 本地推理服务栈 (Tailscale 版本)
# 架构: Claude Code → Tailscale VPN → LiteLLM (4000) → vLLM (8000)

services:
  # 1) tailscale sidecar：拿到稳定的 TS IP
  tailscale-gw:
    image: tailscale/tailscale:latest
    container_name: tailscale-gw
    hostname: llm-gw
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--login-server=${HEADSCALE_URL} --accept-dns=false
    volumes:
      - ./tailscale/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    networks:
      - llmnet

  # 2) vLLM：GLM-4.6V-NVFP4 推理后端
  glm-4.6v-nvfp4:
    build:
      context: .
      dockerfile: Dockerfile
    image: hotwa/glm46v-nvfp4:nightly-t5rc0
    container_name: glm-4.6v-nvfp4
    runtime: nvidia
    network_mode: "service:tailscale-gw"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_TRITON_FLASH_ATTN=0
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu
    volumes:
      - ~/.cache:/root/.cache
      - /usr/lib/wsl/lib/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      - /usr/lib/wsl/lib/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so:ro
    command: >
      GadflyII/GLM-4.6V-NVFP4
      --trust-remote-code
      --dtype auto
      --max-model-len 131072
      --gpu-memory-utilization 0.94
      --tensor-parallel-size 1
      --enable-auto-tool-choice
      --tool-call-parser glm45
      --reasoning-parser glm45
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "16gb"
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped
    depends_on:
      - tailscale-gw
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 240
      start_period: 600s

  # 3) LiteLLM：Anthropic API 兼容层 + 路由
  litellm-router:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm-router
    network_mode: "service:tailscale-gw"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - ./.env.litellm
    environment:
      # 通过 Docker DNS 用容器名访问 vLLM
      - VLLM_API_BASE=http://glm-4.6v-nvfp4:8000/v1
      # 可选：如果 llama.cpp 的 api_base 带了 /v1，需要禁用自动 append
      # - LITELLM_ANTHROPIC_DISABLE_URL_SUFFIX=true
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    restart: unless-stopped
    depends_on:
      glm-4.6v-nvfp4:
        condition: service_healthy

networks:
  llmnet:
    driver: bridge
