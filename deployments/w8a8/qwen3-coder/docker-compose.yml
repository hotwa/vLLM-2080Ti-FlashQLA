version: "3.9"

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen3-coder

    runtime: nvidia

    ports:
      - "8002:8000"

    volumes:
      - ./hf_cache:/root/.cache/huggingface

    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface/hub
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      # 只用两张卡（按需改成 0,1 或 1,2）
      - NVIDIA_VISIBLE_DEVICES=0,1

    # 大上下文/长prompt更稳
    shm_size: "32gb"
    ipc: host

    command: >
      ramblingpolymath/Qwen3-Coder-30B-A3B-Instruct-W8A8
      --tensor-parallel-size 2
      --host 0.0.0.0
      --port 8000
      --dtype half
      --gpu-memory-utilization 0.88
      --max-model-len 65536
      --max-num-seqs 2
      --attention-backend xformers

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # compose 实际上还是靠 NVIDIA_VISIBLE_DEVICES 来限制
              count: all
              capabilities: [gpu]

    restart: unless-stopped
