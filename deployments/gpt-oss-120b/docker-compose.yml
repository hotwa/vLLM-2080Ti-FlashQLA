version: "3.9"

services:
  gptoss-120b:
    image: vllm/vllm-openai:v0.11.2
    container_name: gptoss-120b
    restart: unless-stopped

    ipc: host
    shm_size: "16g"

    ports:
      - "8100:8100"

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      VLLM_ATTENTION_BACKEND: "TRITON_ATTN"
      NVIDIA_VISIBLE_DEVICES: "0"

    volumes:
      - ~/.cachee:/root/.cache

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

    command:
      - "--model"
      - "openai/gpt-oss-120b"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8100"
      - "--max-model-len"
      - "131072"
      - "--max-num-seqs"
      - "4"
      - "--gpu-memory-utilization"
      - "0.92"
      - "--swap-space"
      - "0"
      - "--trust-remote-code"

    ulimits:
      nofile:
        soft: 65536
        hard: 65536
