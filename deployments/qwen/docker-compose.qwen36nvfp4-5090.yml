services:
  vllm:
    build:
      context: ./build/qwen36-custom
      dockerfile: Dockerfile
    image: my-vllm-qwen36-nvfp4-mtp:v0.20.0-pr40898
    container_name: qwen36-27b-nvfp4-mtp-5090
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"

    ports:
      - "8000:8000"

    gpus: all

    volumes:
      - ./.hf-cache:/root/.cache/huggingface

    env_file:
      - ./.env

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - VLLM_LOGGING_LEVEL=INFO
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - VLLM_NVFP4_GEMM_BACKEND=cutlass

    command:
      - sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      - --served-model-name
      - Qwen/Qwen3.6-27B
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --language-model-only
      - --quantization
      - modelopt
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "1"
      - --gpu-memory-utilization
      - "0.92"
      - --max-num-batched-tokens
      - "8192"
      - --kv-cache-dtype
      - turboquant_4bit_nc
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":1}'
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --generation-config
      - vllm
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'

    ulimits:
      memlock: -1
      stack: 67108864

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 120
      start_period: 3600s
