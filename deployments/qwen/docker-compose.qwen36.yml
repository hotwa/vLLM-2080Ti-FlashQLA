services:
  vllm:
    build:
      context: ./build/qwen36-custom
      dockerfile: Dockerfile
    image: my-vllm-qwen36-dflash:v0.20.0-pr40898
    container_name: qwen36-27b-dflash
    restart: unless-stopped
    ipc: host
    shm_size: "32gb"

    ports:
      - "8000:8000"

    gpus: all

    volumes:
      - ./.hf-cache:/root/.cache/huggingface

    env_file:
      - ./.env

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - VLLM_LOGGING_LEVEL=INFO
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - HF_HUB_ENABLE_HF_TRANSFER=0

    command:
      - Qwen/Qwen3.6-27B-FP8
      - --served-model-name
      - Qwen/Qwen3.6-27B
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --language-model-only
      - --attention-backend
      - flash_attn
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "2"
      - --gpu-memory-utilization
      - "0.97"
      - --max-num-batched-tokens
      - "32768"
      - --enable-prefix-caching
      - --prefix-caching-hash-algo
      - xxhash
      - --speculative-config
      - '{"method":"dflash","model":"z-lab/Qwen3.6-27B-DFlash","num_speculative_tokens":6}'
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'

    ulimits:
      memlock: -1
      stack: 67108864

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 3600s
