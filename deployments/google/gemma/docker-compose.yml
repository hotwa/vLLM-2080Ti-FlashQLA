services:
  gemma4:
    image: vllm/vllm-openai:gemma4-cu130   # CUDA 12.9；如果你的环境是 CUDA 13.0，用 :gemma4-cu130
    container_name: gemma4-262k-dp2
    restart: unless-stopped

    ports:
      - "8000:8000"

    ipc: host
    shm_size: "16gb"

    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: all
      CUDA_VISIBLE_DEVICES: 0

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    command:
      - ${MODEL_ID:-google/gemma-4-31B-it}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-gemma-4}
      - --host
      - 0.0.0.0
      - --port
      - "8000"

      # 256K / 262144 上下文
      - --max-model-len
      - "262144"

      # 单 GPU 配置
      - --tensor-parallel-size
      - "1"

      # 每个 DP rank 只接 1 个长请求 => 总并发 2
      - --max-num-seqs
      - "3"

      # 给长 prefill 留一个保守的 chunk 预算
      # - --max-num-batched-tokens
      # - "8192"

      # 关键：长上下文必须省 KV
      - --kv-cache-dtype
      - fp8

      # 给 KV cache 尽量多留显存
      - --gpu-memory-utilization
      - "0.95"
      # 长文本重复前缀时有帮助
      - --enable-prefix-caching
      
      # 开启工具调用
      - --enable-auto-tool-choice
      
      # 👇 解决报错的关键：指定 Gemma 4 专用的工具解析器
      - --tool-call-parser
      - "gemma4"

      # 可选：如果你后面仍然看到 preemption / KV 不够，再打开下面两行
      # - --kv-offloading-size
      # - "64"