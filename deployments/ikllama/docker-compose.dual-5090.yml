      - --alias
      - Qwen3.5-27B
      - --split-mode
      - none
      - -c
      - "262144"
      - -ctk
      - q8_0
      - -ger
      - -mla
      - "3"
      - -amb
      - "512"
      - -ngl
      - "99"
      - -ub
      - "1024"
      - -b
      - "8192"
      - --threads
      - "8"
      - --host
      - 0.0.0.0
